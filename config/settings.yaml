# Open AGI Brain - Configuration Settings

# LLM Provider Configuration
llm:
  provider: openai          # Options: openai, anthropic, ollama, huggingface
  model: gpt-4-turbo-preview
  temperature: 0.7
  max_tokens: 2048
  api_key_env: OPENAI_API_KEY

# Memory System Configuration
memory:
  short_term_capacity: 10       # Max items in short-term memory
  working_memory_capacity: 5    # Max active working memory slots
  vector_db_path: ./data/chroma_db
  embedding_model: all-MiniLM-L6-v2
  similarity_threshold: 0.75

# Perception Engine Configuration
perception:
  text:
    model: gpt-4-turbo-preview
    language: en
  vision:
    model: openai/clip-vit-base-patch32
    max_image_size: 1024
  audio:
    model: openai/whisper-base
    sample_rate: 16000

# Reasoning Engine Configuration
reasoning:
  chain_of_thought:
    enabled: true
    max_steps: 10
  symbolic:
    enabled: true
  causal:
    enabled: true

# Curiosity System Configuration
curiosity:
  novelty_threshold: 0.3      # Cosine distance threshold for novelty
  exploration_rate: 0.1       # Epsilon for exploration
  intrinsic_reward_scale: 0.5
  memory_embedding_model: all-MiniLM-L6-v2

# Decision Engine Configuration
decision:
  planning_algorithm: mcts    # Options: bfs, astar, mcts
  max_planning_depth: 10
  risk_threshold: 0.3
  discount_factor: 0.95

# Self-Reflection Configuration
self_reflection:
  enabled: true
  max_iterations: 3
  improvement_threshold: 0.8  # Quality score threshold to stop iterating

# Knowledge Graph Configuration
knowledge_graph:
  backend: networkx           # Options: networkx, neo4j, rdflib
  neo4j_uri: bolt://localhost:7687
  neo4j_user: neo4j
  neo4j_password_env: NEO4J_PASSWORD

# Logging Configuration
logging:
  level: INFO                 # Options: DEBUG, INFO, WARNING, ERROR
  format: rich                # Options: rich, json, plain
  log_file: ./logs/agi_brain.log
  max_file_size_mb: 100

# API Server Configuration
api:
  host: 0.0.0.0
  port: 8000
  debug: false
  cors_origins:
    - http://localhost:3000
    - http://localhost:8080
